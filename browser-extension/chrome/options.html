<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anti-fomo 插件设置</title>
    <style>
      body {
        margin: 0;
        background: #f5f5f7;
        color: #1d1d1f;
        font-family:
          "SF Pro Text",
          "PingFang SC",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }
      main {
        max-width: 560px;
        margin: 28px auto;
        border: 1px solid #d2d2d7;
        border-radius: 16px;
        background: #fff;
        padding: 20px;
      }
      h1 {
        margin: 0 0 14px;
        font-size: 22px;
      }
      p {
        color: #6e6e73;
        margin: 0 0 14px;
      }
      input {
        width: 100%;
        border-radius: 10px;
        border: 1px solid #d2d2d7;
        padding: 9px 10px;
        font-size: 14px;
      }
      button {
        margin-top: 14px;
        border: 0;
        border-radius: 999px;
        padding: 10px 18px;
        font-size: 14px;
        color: #fff;
        font-weight: 600;
        background: #0071e3;
      }
      #status {
        margin-top: 10px;
        color: #037c31;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Anti-fomo Quick Send 设置</h1>
      <p>配置你的 Anti-fomo API 地址。</p>
      <input id="api-base" type="text" placeholder="http://127.0.0.1:8000" />
      <button id="save-btn" type="button">保存</button>
      <p id="status"></p>
    </main>
    <script src="options.js"></script>
  </body>
  </html>
