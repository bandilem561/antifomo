  </g>
  <g transform="translate(894 230)">
    <text x="0" y="0" fill="#0F172A" font-family="SF Pro Text, Inter, Arial, sans-serif" font-size="19" font-weight="700" letter-spacing="2.6">WORKFLOW SURFACES</text>
    <g transform="translate(0 56)">
      <rect width="488" height="162" rx="28" fill="#0F172A"/>
      <text x="30" y="42" fill="#84F1D5" font-family="SF Pro Text, Inter, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2.8">COLLECTION</text>
      <text x="30" y="86" fill="white" font-family="SF Pro Display, Inter, Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="-1.2">WeChat links and raw signal</text>
      <text x="30" y="124" fill="#CBD5E1" font-family="SF Pro Text, Inter, Arial, sans-serif" font-size="18" font-weight="560">Capture sources quickly and keep intake calm.</text>
    </g>
