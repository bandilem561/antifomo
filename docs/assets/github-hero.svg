      <text x="30" y="42" fill="#1E40AF" font-family="SF Pro Text, Inter, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2.8">RESEARCH</text>
      <text x="30" y="86" fill="#0F172A" font-family="SF Pro Display, Inter, Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="-1.2">Briefs, evidence, summaries</text>
      <text x="30" y="124" fill="#475569" font-family="SF Pro Text, Inter, Arial, sans-serif" font-size="18" font-weight="560">Move from intake to evidence without noisy handoffs.</text>
    </g>
    <g transform="translate(0 432)">
      <rect width="488" height="110" rx="24" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="2"/>
      <text x="28" y="38" fill="#047857" font-family="SF Pro Text, Inter, Arial, sans-serif" font-size="17" font-weight="700" letter-spacing="2.6">EXECUTION</text>
      <text x="28" y="74" fill="#065F46" font-family="SF Pro Text, Inter, Arial, sans-serif" font-size="21" font-weight="600">Focus sessions, action cards, and next steps</text>
